<style>
body{
  margin:0;
  font-family:'Inter',sans-serif;
  background:#f2f2f2;

header{
  background:black;
  color:white;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px;
}

.logo{font-size:28px;font-weight:bold;cursor:pointer;}
nav a{color:white;margin-left:15px;text-decoration:none;cursor:pointer;}

.main-layout{display:flex;gap:20px;padding:20px;}

.hero{flex:2;background:white;border-radius:10px;overflow:hidden;cursor:pointer;}
.hero img{width:100%;height:380px;object-fit:cover;}
.hero h2{padding:10px;margin:0;font-size:24px;}

.sidebar{flex:1;background:white;border-radius:10px;padding:10px;}

#articles{
  display:grid;

.article-card img{width:100%;height:180px;object-fit:cover;}
.article-card h3{padding:10px;margin:0;font-size:18px;}

#articlePage{display:none;padding:20px;}

.article-layout{display:flex;gap:20px;}

.article-main{
  flex:2;
  background:white;
  padding:15px;
  border-radius:10px;
}

.article-side{
  flex:1;
  background:white;
  padding:10px;
  border-radius:10px;
}

.side-item{display:flex;gap:10px;margin-bottom:10px;cursor:pointer;}
.side-item img{width:80px;height:60px;object-fit:cover;border-radius:6px;}
.side-item span{font-size:14px;}

.back{
  background:black;
  color:white;
  border:none;
  padding:10px 15px;
  margin-bottom:15px;
  cursor:pointer;
}

.actions button{
  padding:8px 15px;
  margin-right:10px;
  cursor:pointer;
}

.comment{
  background:white;
  padding:10px;
  margin-bottom:10px;
  border-radius:6px;
}

========================= */

  body{
    font-size:16px;
  }

  header{
    flex-direction:column;
    align-items:flex-start;
    gap:10px;

  nav{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
  }

  nav a{
    margin:0;

  /* STACK MAIN LAYOUT */

    flex-direction:column;
    padding:10px;
  }

  .hero img{
    height:220px; /* was 380 = too big */
  }

  .hero h2{
    font-size:18px;
  }

  .sidebar{
    margin-top:10px;
  }

  /* ARTICLES GRID */
  #articles{
    grid-template-columns:1fr; /* single column */
    padding:10px;
  }

  .article-card img{
    height:160px;
  }

  .article-card h3{
    font-size:16px;
  }

  /* ARTICLE PAGE STACK */
  .article-layout{
    flex-direction:column;
  }

  .article-main{
    padding:10px;
  }

  .article-main img{
    height:220px;
    object-fit:cover;
  }

  .article-side{
    margin-top:15px;
  }

  /* SIDE ITEMS */
  .side-item img{
    width:70px;
    height:50px;
  }

  .side-item span{
    font-size:13px;
  }

  /* BUTTONS */
  .actions button{
    margin-bottom:8px;
    width:100%;
  }

  textarea{
    width:100%;
    min-height:80px;
  }

  footer{
    font-size:12px;
    padding:15px;
  }
}


/* =========================
   EXTRA SMALL PHONES
========================= */
@media (max-width: 480px){

  .logo{
    font-size:21px;
  }

  .hero img{
    height:180px;
  }

  .hero h2{
    font-size:16px;
  }

  .article-main h1{
    font-size:20px;
  }

}
footer{
  text-align:center;
  padding:20px;
  margin-top:40px;
  background:#111;
  color:white;
  font-size:14px;
}

#likeNudge{
  position:fixed;
  bottom:80px;
  right:20px;
  background:#ff4d6d;
  color:white;
  padding:12px 18px;
  border-radius:30px;
  font-size:14px;
  font-weight:600;
  box-shadow:0 5px 15px rgba(0,0,0,0.2);
  opacity:0;
  transform:translateY(20px);
  transition:0.4s ease;
  z-index:999;
  cursor:pointer;
  animation:pulse 2s infinite;
}

#likeNudge.show{
  opacity:1;
  transform:translateY(0);
}

@keyframes pulse{
  0%{transform:scale(1);}
  50%{transform:scale(1.08);}
  100%{transform:scale(1);}
}

<body>

<header>
<div class="logo" onclick="goHome()">GeekHub</div>
<nav>
<a onclick="goHome()">Home</a>
<a onclick="showCategory('anime')">Anime</a>
<a onclick="showCategory('gaming')">Gaming</a>
<a onclick="showCategory('movies')">Movies</a>
<a onclick="showCategory('news')">News</a>
<a onclick="showCategory('sports')">Sports</a>
<a onclick="showCategory('pop')">Pop Culture</a>
</nav>
</header>

<div class="main-layout" id="homeLayout">
  <div class="hero" id="hero"></div>
  <div class="sidebar" id="sidebar"></div>
</div>

<div id="articles"></div>

<section id="articlePage">
<div class="article-layout">

<div class="article-main">
<button class="back" onclick="goHome()">⬅ Back</button>

<div id="articleContent"></div>

<div class="actions">
<button onclick="likeArticle()">👍 Like <span id="likeCount">0</span></button>
<button onclick="favArticle()">⭐ Favourite</button>
</div>

<h3>Comments</h3>
<div id="comments"></div>

<textarea id="commentText" placeholder="Write comment..."></textarea>
<button onclick="addComment()">Post Comment</button>

<button onclick="openEdit()">✏️ Edit</button>
</div>

<div class="article-side" id="articleSide"></div>

</div>
</section>
<div id="likeNudge">
  ❤️ Enjoying this? Tap Like!
</div>
<footer>

    <a href="index.html">Home</a><br>

    <a href="privacy.html">Privacy</a><br>
  </nav>
</footer>

<script>
let currentArticle=null;
let ADMIN_KEY="Gambatukatiyamike03";
const API = window.location.origin;

/* =========================
   FORMAT DATE
========================= */
function formatDate(date){
  if(!date) return "";
  const d=new Date(date);
  return d.toLocaleString("en-GB",{dateStyle:"medium",timeStyle:"short"});
}

/* =========================
   URL HANDLING
========================= */
function setURL(article, replace=false){
  const url = article && article._id ? `/article/${article._id}` : `/`;
  if(replace){
    history.replaceState({}, "", url);
  }else{
    history.pushState({}, "", url);
  }
}

/* =========================
   LOAD ARTICLES
========================= */
async function loadArticles(){
  try{
    const res=await fetch(`${API}/articles`);
    const data=await res.json();
    return Array.isArray(data)?data:[];
  }catch(e){return [];}
}

/* =========================
   HOME HERO + SIDEBAR
========================= */
function buildHome(data){
  if(!data.length) return;

  const sorted=[...data].sort((a,b)=>new Date(b.date)-new Date(a.date));

  document.getElementById("hero").innerHTML=`
    <img src="${sorted[0].image||''}">
    <h2>${sorted[0].title}</h2>
  `;

  document.getElementById("hero").onclick=()=>openArticle(sorted[0]);

  const side=document.getElementById("sidebar");
  side.innerHTML="<h3>Trending</h3>";

  sorted.slice(0,5).forEach(a=>{
    const div=document.createElement("div");
    div.innerHTML="🔥 "+a.title;
    div.onclick=()=>openArticle(a);
    side.appendChild(div);
  });
}

/* =========================
   RENDER ARTICLES
========================= */
function renderArticles(list){
  const container=document.getElementById("articles");
  container.innerHTML="";

  const sorted=[...list].sort((a,b)=>new Date(b.date)-new Date(a.date));
  buildHome(sorted);

  sorted.forEach(a=>{
    const card=document.createElement("div");
    card.className="article-card";

    card.innerHTML=`
      <img src="${a.image||''}">
      <h3>${a.title}</h3>
      <p>👍 ${a.likes||0} | 💬 ${(a.comments||[]).length}</p>
    `;

    const meta=document.createElement("small");
    meta.style.padding="0 10px";
    meta.style.display="block";
    meta.style.color="gray";
    meta.innerText=`By ${a.author||"GeekHub"} • ${formatDate(a.date)}`;
    card.appendChild(meta);

    card.onclick=()=>openArticle(a);
    container.appendChild(card);
  });
}

/* =========================
   OPEN ARTICLE
========================= */
function openArticle(article){
  currentArticle=article;
  setURL(article);

  document.getElementById("homeLayout").style.display="none";
  document.getElementById("articles").style.display="none";
  document.getElementById("articlePage").style.display="block";

  document.getElementById("articleContent").innerHTML=`
    <h1>${article.title}</h1>
    <p style="color:gray">By ${article.author||"GeekHub"} • ${formatDate(article.date)}</p>
    <img src="${article.image||''}" style="width:100%">
    <div>${article.content}</div>
  `;

  document.getElementById("likeCount").innerText=article.likes||0;

  loadComments();

  loadArticles().then(data=>{
    const side=document.getElementById("articleSide");
    side.innerHTML="<h3>More in this category</h3>";

    data
      .filter(a=>a.category===article.category && a._id!==article._id)
      .slice(0,5)
      .forEach(a=>{
        const div=document.createElement("div");
        div.className="side-item";
        div.innerHTML=`<img src="${a.image||''}"><span>${a.title}</span>`;
        div.onclick=()=>openArticle(a);
        side.appendChild(div);
      });
  });

  // ✅ TRIGGER ANIMATION
  showLikeNudge();
}

/* =========================
   NAVIGATION
========================= */
function goHome(){
  setURL(null);
  document.getElementById("articlePage").style.display="none";
  document.getElementById("homeLayout").style.display="flex";
  document.getElementById("articles").style.display="grid";
  showHome();
}

window.onpopstate = () => {
  const path = window.location.pathname;

  if(path.startsWith("/article/")){
    const id = path.split("/article/")[1];

    fetch(`${API}/articles/${id}`)
      .then(r=>r.json())
      .then(article=>{
        if(article && article._id){
          openArticle(article);
        }
      });
  } else {
    goHome();
  }
};

/* =========================
   LOAD DATA
========================= */
async function showHome(){
  const data=await loadArticles();
  renderArticles(data);
}

async function showCategory(cat){
  const data=await loadArticles();
  renderArticles(data.filter(a=>a.category===cat));
}

/* =========================
   COMMENTS
========================= */
function loadComments(){
  const box=document.getElementById("comments");
  box.innerHTML="";
  (currentArticle.comments||[]).forEach(c=>{
    const d=document.createElement("div");
    d.className="comment";
    d.innerText=c;
    box.appendChild(d);
  });
}

/* =========================
   LIKE SYSTEM
========================= */
async function likeArticle(){
  if(!currentArticle) return;
  await fetch(`${API}/articles/${currentArticle._id}/like`,{method:"POST"});
  currentArticle.likes=(currentArticle.likes||0)+1;
  document.getElementById("likeCount").innerText=currentArticle.likes;
}

/* =========================
   COMMENTS POST
========================= */
async function addComment(){
  const t=document.getElementById("commentText").value;
  if(!t) return;

  await fetch(`${API}/articles/${currentArticle._id}/comment`,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({comment:t})
  });

  if(!currentArticle.comments) currentArticle.comments=[];
  currentArticle.comments.push(t);

  document.getElementById("commentText").value="";
  loadComments();
}

/* =========================
   OTHER ACTIONS
========================= */
function favArticle(){
  alert("Saved to favourites (you can connect backend later)");
}

function openEdit(){
  const key=prompt("Enter admin key:");
  if(key===ADMIN_KEY){
    localStorage.setItem("editArticle",JSON.stringify(currentArticle));
    window.location.href="/write.html";
  }
}

/* =========================
   DIRECT LINK CHECK
========================= */
checkDirectLink();

function checkDirectLink(){
  const path=window.location.pathname;

  if(path.startsWith("/article/")){
    const id=path.split("/article/")[1];

    fetch(`${API}/articles/${id}`)
      .then(r=>r.json())
      .then(article=>{
        if(article && article._id){
          openArticle(article);
        }else showHome();
      });
  }else showHome();
}

/* =========================
   LIKE NUDGE ANIMATION
========================= */
let nudgeReady = false;

function showLikeNudge(){
  const nudge = document.getElementById("likeNudge");

  nudge.innerHTML = "❤️ Enjoying this? Tap Like!";
  nudge.style.background = "#ff4d6d";

  setTimeout(()=>{
    nudge.classList.add("show");
    nudgeReady = true;
  }, 4000);

  setTimeout(()=>{
    nudge.classList.remove("show");
    nudgeReady = false;
  }, 12000);
}

document.getElementById("likeNudge").onclick = () => {
  if(!nudgeReady) return;

  likeArticle();

  const nudge = document.getElementById("likeNudge");
  nudge.innerHTML = "🔥 Thanks for the support!";
  nudge.style.background = "#28a745";

  setTimeout(()=>{
    nudge.classList.remove("show");
  },2000);
};
</script>

</body>
